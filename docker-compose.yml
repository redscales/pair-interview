services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - backend-venv:/opt/venv
      - backend-data:/app/data
    environment:
      - DB_PATH=/app/data/recipes.db

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend-modules:/app/node_modules
    environment:
      - VITE_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  backend-venv:
  backend-data:
  frontend-modules:
